server {
    listen 80;
    client_max_body_size 10M;

    # Docker Swarm internal DNS — resolves service names lazily at request time
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    location /api/auth/ {
        set $upstream http://auth-service:5001;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Must come BEFORE /api/players/ to match recommendations
    location ~ ^/api/players/[^/]+/recommendations {
        set $upstream http://ai-recommendation-service:5004;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/players/ {
        set $upstream http://player-service:5002;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/fl/ {
        set $upstream http://fl-service:5003;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/feedback/ {
        set $upstream http://feedback-service:5005;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        set $upstream http://frontend:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
