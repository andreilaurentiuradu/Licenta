version: '3.8'

# ── Docker Swarm stack ────────────────────────────────────────────
# Build:   ./run.sh build
# Deploy:  ./run.sh start
# Stop:    ./run.sh stop
# Status:  ./run.sh status
# Logs:    ./run.sh logs [postgres|keycloak|gateway|auth-service|player-service|fl-service|ai-service|feedback-service|frontend]
# ─────────────────────────────────────────────────────────────────

configs:
  realm_config:
    file: ./keycloak/realm-export.json

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       lawranalyzer
      POSTGRES_USER:     sa_user
      POSTGRES_PASSWORD: sa_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      restart_policy: {condition: on-failure, delay: 5s}
    healthcheck:
      disable: true

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    command: [start-dev, --import-realm]
    configs:
      - source: realm_config
        target: /opt/keycloak/data/import/realm-export.json
    ports:
      - "8180:8080"
    deploy:
      replicas: 1
      restart_policy: {condition: on-failure, delay: 10s}
    healthcheck:
      disable: true

  gateway:
    image: lawranalyzer-gateway:latest
    ports:
      - "5000:80"
    deploy:
      replicas: 1
      restart_policy: {condition: on-failure, delay: 5s}

  auth-service:
    image: lawranalyzer-auth:latest
    environment:
      KEYCLOAK_URL:        http://keycloak:8080
      KEYCLOAK_REALM:      lawranalyzer
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASS: admin123
    deploy:
      replicas: 1
      restart_policy: {condition: on-failure, delay: 5s}

  player-service:
    image: lawranalyzer-player:latest
    environment:
      DATABASE_URL:        postgresql://sa_user:sa_pass@postgres:5432/lawranalyzer
      KEYCLOAK_URL:        http://keycloak:8080
      KEYCLOAK_REALM:      lawranalyzer
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASS: admin123
      FL_SERVICE_URL:      http://fl-service:5003
    deploy:
      replicas: 1
      restart_policy: {condition: on-failure, delay: 5s}

  fl-service:
    image: lawranalyzer-fl:latest
    environment:
      DATABASE_URL:        postgresql://sa_user:sa_pass@postgres:5432/lawranalyzer
      KEYCLOAK_URL:        http://keycloak:8080
      KEYCLOAK_REALM:      lawranalyzer
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASS: admin123
    deploy:
      replicas: 1
      restart_policy: {condition: on-failure, delay: 5s}

  ai-service:
    image: lawranalyzer-ai:latest
    environment:
      DATABASE_URL:        postgresql://sa_user:sa_pass@postgres:5432/lawranalyzer
      KEYCLOAK_URL:        http://keycloak:8080
      KEYCLOAK_REALM:      lawranalyzer
      GROQ_API_KEY:        ${GROQ_API_KEY:-}
    deploy:
      replicas: 1
      restart_policy: {condition: on-failure, delay: 5s}

  feedback-service:
    image: lawranalyzer-feedback:latest
    environment:
      DATABASE_URL:        postgresql://sa_user:sa_pass@postgres:5432/lawranalyzer
      KEYCLOAK_URL:        http://keycloak:8080
      KEYCLOAK_REALM:      lawranalyzer
    deploy:
      replicas: 1
      restart_policy: {condition: on-failure, delay: 5s}

  frontend:
    image: lawranalyzer-frontend:latest
    environment:
      BACKEND_URL: http://gateway:80
      KC_URL:      http://keycloak:8080
    deploy:
      replicas: 1
      restart_policy: {condition: on-failure, delay: 5s}

volumes:
  pg_data:

networks:
  default:
    attachable: true
