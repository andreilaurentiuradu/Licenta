name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  auth-service-tests:
    name: Auth Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-auth-${{ hashFiles('services/auth-service/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-auth-

      - name: Install dependencies
        working-directory: services/auth-service
        run: pip install -r requirements.txt

      - name: Run auth-service tests
        working-directory: services/auth-service
        run: pytest tests/ -v --tb=short
        env:
          KEYCLOAK_URL: http://localhost
          KEYCLOAK_REALM: test

  player-service-tests:
    name: Player Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-player-${{ hashFiles('services/player-service/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-player-

      - name: Install dependencies
        working-directory: services/player-service
        run: pip install -r requirements.txt

      - name: Run player-service tests
        working-directory: services/player-service
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "sqlite:///:memory:"
          KEYCLOAK_URL: http://localhost
          KEYCLOAK_REALM: test
          FL_SERVICE_URL: http://localhost:5003

  fl-service-tests:
    name: FL Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-fl-${{ hashFiles('services/fl-service/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-fl-

      - name: Install dependencies
        working-directory: services/fl-service
        run: pip install -r requirements.txt

      - name: Run fl-service tests
        working-directory: services/fl-service
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "sqlite:///:memory:"
          KEYCLOAK_URL: http://localhost
          KEYCLOAK_REALM: test

  ai-service-tests:
    name: AI Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ai-${{ hashFiles('services/ai-service/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-ai-

      - name: Install dependencies
        working-directory: services/ai-service
        run: pip install -r requirements.txt

      - name: Run ai-service tests
        working-directory: services/ai-service
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "sqlite:///:memory:"
          KEYCLOAK_URL: http://localhost
          KEYCLOAK_REALM: test
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  feedback-service-tests:
    name: Feedback Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-feedback-${{ hashFiles('services/feedback-service/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-feedback-

      - name: Install dependencies
        working-directory: services/feedback-service
        run: pip install -r requirements.txt

      - name: Run feedback-service tests
        working-directory: services/feedback-service
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "sqlite:///:memory:"
          KEYCLOAK_URL: http://localhost
          KEYCLOAK_REALM: test

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run

  all-tests-passed:
    name: All tests passed
    runs-on: ubuntu-latest
    needs:
      - auth-service-tests
      - player-service-tests
      - fl-service-tests
      - ai-service-tests
      - feedback-service-tests
      - frontend-tests
    steps:
      - run: echo "All CI checks passed."
