upstream auth_svc     { server auth-service:5001; }
upstream player_svc   { server player-service:5002; }
upstream fl_svc       { server fl-service:5003; }
upstream ai_svc       { server ai-service:5004; }
upstream feedback_svc { server feedback-service:5005; }
upstream frontend_svc { server frontend:3000; }

server {
    listen 80;
    client_max_body_size 10M;

    location /api/auth/ {
        proxy_pass http://auth_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Must come BEFORE /api/players/ to match recommendations
    location ~ ^/api/players/[^/]+/recommendations {
        proxy_pass http://ai_svc;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/players/ {
        proxy_pass http://player_svc;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/fl/ {
        proxy_pass http://fl_svc;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/feedback/ {
        proxy_pass http://feedback_svc;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://frontend_svc;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
