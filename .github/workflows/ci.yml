name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  # ── auth-service ────────────────────────────────────────────────
  test-auth-service:
    name: auth-service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/auth-service/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short
        env:
          KEYCLOAK_URL: http://localhost
          KEYCLOAK_REALM: test

  # ── player-service ──────────────────────────────────────────────
  test-player-service:
    name: player-service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/player-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/player-service/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///:memory:
          KEYCLOAK_URL: http://localhost
          KEYCLOAK_REALM: test
          FL_SERVICE_URL: http://localhost:5003

  # ── fl-service ──────────────────────────────────────────────────
  test-fl-service:
    name: fl-service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/fl-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/fl-service/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///:memory:
          KEYCLOAK_URL: http://localhost
          KEYCLOAK_REALM: test

  # ── ai-service ──────────────────────────────────────────────────
  test-ai-service:
    name: ai-service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/ai-service/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///:memory:
          KEYCLOAK_URL: http://localhost
          KEYCLOAK_REALM: test
          GROQ_API_KEY: ""

  # ── feedback-service ────────────────────────────────────────────
  test-feedback-service:
    name: feedback-service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/feedback-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/feedback-service/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///:memory:
          KEYCLOAK_URL: http://localhost
          KEYCLOAK_REALM: test

  # ── frontend ────────────────────────────────────────────────────
  test-frontend:
    name: frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --run

  # ── guard job (branch protection target) ───────────────────────
  all-tests-passed:
    name: All tests passed
    runs-on: ubuntu-latest
    needs:
      - test-auth-service
      - test-player-service
      - test-fl-service
      - test-ai-service
      - test-feedback-service
      - test-frontend
    steps:
      - run: echo "All CI checks passed."
